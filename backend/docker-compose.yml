version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres_treinos
    restart: always
    environment:
      POSTGRES_USER: daniel
      POSTGRES_PASSWORD: daniel123
      POSTGRES_DB: treinos_db
    ports:
      - '5432:5432'

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
